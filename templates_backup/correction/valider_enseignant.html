{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white p-4">
            <h2 class="mb-0">Révision Enseignant - IA</h2>
        </div>
        <div class="card-body p-5">
            <h5 class="text-muted">Analyse de l'IA</h5>
            <div class="bg-light p-3 rounded mb-4">
                <p>Note suggérée : <strong>{{ correction.note_ia }} / 20</strong></p>
                <p>Commentaires : {{ correction.json_resultat.appreciation_globale }}</p>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Note Finale</label>
                    <input type="number" step="0.5" name="note" class="form-control" value="{{ correction.note_ia }}" required>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100">Soumettre pour Révision Admin</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
