{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto glass p-10 rounded-3xl">
    <h1 class="text-3xl font-bold mb-8 text-center text-white">Connexion</h1>
    <form action="/api/v1/auth/login" method="POST" class="space-y-6">
        <div>
            <label class="block text-sm text-slate-400 mb-2">Email</label>
            <input type="email" class="w-full bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary" required>
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-2">Mot de passe</label>
            <input type="password" class="w-full bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary" required>
        </div>
        <div class="flex items-center justify-between text-sm">
            <label class="flex items-center">
                <input type="checkbox" class="mr-2 rounded bg-slate-800 border-none"> Se souvenir de moi
            </label>
            <a href="#" class="text-primary hover:underline">Mot de passe oublié ?</a>
        </div>
        <button type="submit" class="w-full bg-primary hover:bg-secondary py-4 rounded-xl font-bold text-white transition shadow-lg shadow-primary/20">
            Se connecter
        </button>
    </form>
    <p class="mt-8 text-center text-slate-400 text-sm">
        Pas encore de compte ? <a href="/accounts/register/" class="text-primary font-bold hover:underline">Inscrivez-vous</a>
    </p>
</div>
{% endblock %}
