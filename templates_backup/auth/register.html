{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto glass p-10 rounded-3xl" x-data="{ role: 'eleve' }">
    <h1 class="text-3xl font-bold mb-8 text-center text-white">Créer un compte</h1>
    <form action="/api/v1/auth/register" method="POST" class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm text-slate-400 mb-2">Prénom</label>
                <input type="text" class="w-full bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary" required>
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Nom</label>
                <input type="text" class="w-full bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary" required>
            </div>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Email</label>
            <input type="email" class="w-full bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary" required>
        </div>

        <div>
            <label class="block text-sm text-slate-400 mb-2">Rôle</label>
            <select x-model="role" class="w-full bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary">
                <option value="eleve">Élève</option>
                <option value="professeur">Professeur</option>
                <option value="conseiller">Conseiller Pédagogique</option>
                <option value="admin">Administrateur</option>
            </select>
        </div>

        <div x-show="role !== 'eleve'" class="bg-primary/10 p-4 rounded-xl border border-primary/20">
            <label class="block text-sm text-primary mb-2 font-bold">Mot de passe du rôle</label>
            <input type="password" placeholder="Ex: prof2026" class="w-full bg-slate-900 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary">
        </div>

        <div>
            <label class="block text-sm text-slate-400 mb-2">Mot de passe personnel</label>
            <input type="password" class="w-full bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary" required>
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-secondary py-4 rounded-xl font-bold text-white transition shadow-lg shadow-primary/20">
            Créer mon compte
        </button>
    </form>
</div>
{% endblock %}
