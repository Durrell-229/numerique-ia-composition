{% extends 'base.html' %}
{% block content %}
<div class="max-w-6xl mx-auto p-6 glass rounded-2xl text-white">
    <h2 class="text-3xl font-bold mb-6">Supervision des Membres</h2>
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="border-b border-bg-tertiary">
                    <th class="p-3">Photo</th>
                    <th class="p-3">Nom</th>
                    <th class="p-3">Rôle</th>
                    <th class="p-3">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for member in members %}
                <tr class="border-b border-bg-tertiary">
                    <td class="p-3">
                        {% if member.avatar %}
                            <img src="{{ member.avatar.url }}" class="w-10 h-10 rounded-full">
                        {% else %}
                            <div class="w-10 h-10 rounded-full bg-button-gradient flex items-center justify-center">{{ member.first_name|slice:":1" }}</div>
                        {% endif %}
                    </td>
                    <td class="p-3">{{ member.full_name }}</td>
                    <td class="p-3 uppercase text-xs font-bold">{{ member.role }}</td>
                    <td class="p-3">
                        <button class="text-accent hover:underline">Voir profil</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
