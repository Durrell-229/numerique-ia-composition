{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4" style="background: #1E293B; border: 1px solid #475569;">
        <div class="card-header p-4" style="background: #0F172A; color: #F1F5F9;">
            <h2 class="mb-0">Révision Administrative</h2>
        </div>
        <div class="card-body p-5">
            <h4 class="mb-4" style="color: #F1F5F9;">Détails de la copie</h4>
            <div class="row mb-4">
                <div class="col-md-6" style="color: #CBD5E1;">Note IA : <strong>{{ correction.note_ia }}</strong></div>
                <div class="col-md-6" style="color: #CBD5E1;">Note Enseignant : <strong>{{ correction.note_finale }}</strong></div>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-3">
                    <button type="submit" name="approuver" class="btn btn-lg flex-fill" style="background: #059669; color: #F1F5F9; border: none;">Approuver et Publier</button>
                    <button type="submit" name="refuser" class="btn btn-lg flex-fill" style="background: #DC2626; color: #F1F5F9; border: none;">Renvoyer à l'enseignant</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
