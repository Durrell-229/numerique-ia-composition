{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-dark text-white p-4">
            <h2 class="mb-0">Révision Administrative</h2>
        </div>
        <div class="card-body p-5">
            <h4 class="mb-4">Détails de la copie</h4>
            <div class="row mb-4">
                <div class="col-md-6">Note IA : <strong>{{ correction.note_ia }}</strong></div>
                <div class="col-md-6">Note Enseignant : <strong>{{ correction.note_finale }}</strong></div>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-3">
                    <button type="submit" name="approuver" class="btn btn-success btn-lg flex-fill">Approuver et Publier</button>
                    <button type="submit" name="refuser" class="btn btn-danger btn-lg flex-fill">Renvoyer à l'enseignant</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
